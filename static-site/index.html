<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票投研看板 · 开源静态演示版</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="./echarts.min.js"></script>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">投</div>
      <div class="title">投研看板<small>STOCK RESEARCH</small></div>
    </div>

    <div class="search-box">
      <input id="search" class="search" type="text" placeholder="搜代码 / 名称，如 600519、贵州茅台、比亚迪" autocomplete="off" />
      <div id="suggest" class="suggest" style="display:none"></div>
    </div>

    <div class="nav">
      <div class="nav-item active" data-view="market"><span class="ic">📊</span>市场看板</div>
      <div class="nav-item" data-view="detail"><span class="ic">🔍</span>个股详情</div>
      <div class="nav-item" data-view="ai"><span class="ic">🤖</span>AI 问答</div>
      <div class="nav-item" data-view="portfolio"><span class="ic">🩺</span>组合诊断</div>
    </div>

    <div class="nav-section">
      <div class="nav-title">自选股</div>
      <div id="watchlist" class="watchlist"></div>
    </div>

    <div class="nav-section">
      <div class="nav-title">板块</div>
      <div id="sectorNav" class="sector-nav"></div>
    </div>

    <div class="side-foot">
      <span id="srcBadge" class="badge sample">—</span>
      <button id="themeBtn" class="theme-btn" title="切换主题">🌓</button>
    </div>
  </aside>

  <!-- 主区 -->
  <main class="main">
    <div class="demo-banner">
      <b>开源静态演示版</b> · <b class="hl">行情实时刷新</b>（腾讯财经接口，浏览器直连）。K线 / 估值等基本面为构建快照；完整全市场搜索 + 每日自动刷新请按仓库 README 用 Docker 自托管部署。
    </div>

    <div class="topbar">
      <div class="crumb"><span id="crumbView">市场看板</span> · <b id="crumbName">—</b></div>
      <div class="topbar-right">
        <div class="refresh-info">
          <span id="liveDot" class="live-dot">● 实时</span>
          <span>行情 <b id="lastRefresh">连接中…</b></span>
          <span class="muted">快照数据 <b id="updatedAt">—</b></span>
        </div>
      </div>
    </div>

    <!-- 市场看板 -->
    <section id="viewMarket" class="view active"></section>

    <!-- 个股详情 -->
    <section id="viewDetail" class="view">
      <div id="detailSection" class="detail"></div>
    </section>

    <!-- AI 问答 -->
    <section id="viewAI" class="view">
      <div class="ai-wrap">
        <div class="ai-input-row">
          <input id="aiInput" class="ai-input" type="text" placeholder="问问看，例如：贵州茅台现在估值贵吗？ / 比亚迪近期表现如何？ / 今天大盘怎么样？" autocomplete="off" />
          <button id="aiSend" class="ai-send">发送</button>
        </div>
        <div class="ai-chips" id="aiChips"></div>
        <div id="aiAnswer" class="ai-answer"></div>
      </div>
    </section>

    <!-- 组合诊断 -->
    <section id="viewPortfolio" class="view"></section>

    <footer class="disclaimer">
      <b>风险提示：</b>本看板为面向个人投资者的研究辅助工具，数据为 AkShare 等公开源整理，可能存在延迟或偏差。
      所有内容仅供研究参考，<b>不构成任何投资建议</b>。市场有风险，投资需谨慎。
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>

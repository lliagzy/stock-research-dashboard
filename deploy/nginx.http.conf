# 阶段一（仅 HTTP）：用于首次申请 Let's Encrypt 证书。
# 证书申请成功后，删掉本文件，改用 nginx.https.conf 即可启用 HTTPS。
# 用法：把本文件复制为 nginx.conf 后再启动 docker compose。

server {
    listen 80;
    server_name YOUR_DOMAIN;   # 改成你的域名，如 stock.example.com

    # 1) 先把根路径代理到后端（可选，方便先验证站点可访问）
    location / {
        proxy_pass http://web:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2) Let's Encrypt 验证挑战目录（certbot 会在此写入校验文件）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
